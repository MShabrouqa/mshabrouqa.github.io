<!DOCTYPE html>
<html>

<head>

<title>Mobile Device Information</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
font-family:Arial;
background:#eee;
padding:20px;
}

.box{
background:white;
padding:20px;
border-radius:10px;
max-width:700px;
margin:auto;
}

table{
width:100%;
}

td{
padding:6px;
border-bottom:1px solid #ddd;
}

</style>

</head>


<body>


<div class="box">

<h2>Device Information</h2>

<table id="info"></table>

<br>

<a id="map" target="_blank"></a>


</div>


<script>


let table=document.getElementById("info");


function add(name,value){

table.innerHTML +=
`
<tr>
<td><b>${name}</b></td>
<td>${value}</td>
</tr>
`;

}



// Browser data

add(
"User Agent",
navigator.userAgent
);


add(
"Platform",
navigator.platform
);


add(
"Language",
navigator.language
);


add(
"Languages",
navigator.languages
);



add(
"Cookies Enabled",
navigator.cookieEnabled
);



add(
"Do Not Track",
navigator.doNotTrack
);



add(
"Online",
navigator.onLine
);




// Screen

add(
"Screen",
screen.width+" x "+screen.height
);


add(
"Available Screen",
screen.availWidth+" x "+screen.availHeight
);


add(
"Pixel Ratio",
window.devicePixelRatio
);




// Hardware

add(
"CPU Cores",
navigator.hardwareConcurrency || "Unknown"
);


add(
"RAM",
(navigator.deviceMemory || "Unknown")+" GB"
);



add(
"Touch Points",
navigator.maxTouchPoints
);




// Time

add(
"Time Zone",
Intl.DateTimeFormat().resolvedOptions().timeZone
);


add(
"Local Time",
new Date()
);



// Network

if(navigator.connection){

add(
"Network Type",
navigator.connection.type || "Unknown"
);


add(
"Effective Speed",
navigator.connection.effectiveType
);


add(
"Downlink",
navigator.connection.downlink+" Mbps"
);


add(
"RTT",
navigator.connection.rtt+" ms"
);

}



// Orientation

add(
"Orientation",
screen.orientation ?
screen.orientation.type :
"Unknown"
);



// Battery

if(navigator.getBattery){


navigator.getBattery()
.then(function(b){


add(
"Battery",
Math.round(b.level*100)+"%"
);


add(
"Charging",
b.charging
);


});


}





// IP + Location


let gpsUsed=false;



async function location(){


if(navigator.permissions){


let p =
await navigator.permissions.query(
{name:"geolocation"}
);


if(p.state=="granted"){


navigator.geolocation.getCurrentPosition(

pos=>{


gpsUsed=true;


showLocation(
pos.coords.latitude,
pos.coords.longitude,
"GPS"
);


},

()=>{

ipLocation();

}

);


}

else{


ipLocation();


}


}

else{


ipLocation();


}



}




function ipLocation(){


fetch(
"https://ipapi.co/json/"
)


.then(r=>r.json())


.then(d=>{


add(
"Public IP",
d.ip
);


add(
"ISP",
d.org
);


add(
"Country",
d.country_name
);


add(
"City",
d.city
);


showLocation(
d.latitude,
d.longitude,
"IP"
);


});


}




function showLocation(lat,lon,type){


add(
"Location Source",
type
);


add(
"Latitude",
lat
);


add(
"Longitude",
lon
);



document.getElementById("map").href =
"https://www.google.com/maps?q="+lat+","+lon;


document.getElementById("map").innerHTML =
"Open Google Maps";


}



location();


</script>


</body>

</html>
