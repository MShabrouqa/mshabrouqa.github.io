<!DOCTYPE html>
<html>
<head>
<title>Device Information</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
    font-family:Arial;
    margin:30px;
    text-align:center;
}

.box{
    background:#eeeeee;
    padding:20px;
    border-radius:10px;
}

table{
    width:100%;
}

td{
    padding:8px;
    text-align:left;
}

</style>

</head>


<body>


<div class="box">

<h2>Device Information</h2>


<table>

<tr>
<td>Device Name:</td>
<td id="deviceName">-</td>
</tr>


<tr>
<td>Device Type:</td>
<td id="deviceType">-</td>
</tr>


<tr>
<td>Operating System:</td>
<td id="os">-</td>
</tr>


<tr>
<td>Browser:</td>
<td id="browser">-</td>
</tr>


<tr>
<td>Battery:</td>
<td id="battery">-</td>
</tr>


<tr>
<td>IP Address:</td>
<td id="ip">-</td>
</tr>


<tr>
<td>Screen:</td>
<td id="screen">-</td>
</tr>


<tr>
<td>CPU Cores:</td>
<td id="cpu">-</td>
</tr>


<tr>
<td>RAM:</td>
<td id="ram">-</td>
</tr>


<tr>
<td>Language:</td>
<td id="lang">-</td>
</tr>


<tr>
<td>Time Zone:</td>
<td id="timezone">-</td>
</tr>


</table>


</div>



<script>


// Browser + OS

let ua = navigator.userAgent;


document.getElementById("browser").innerHTML =
getBrowser();


document.getElementById("os").innerHTML =
getOS();



function getBrowser(){

if(ua.includes("Chrome"))
return "Chrome";

if(ua.includes("Firefox"))
return "Firefox";

if(ua.includes("Safari"))
return "Safari";

return "Unknown";

}



function getOS(){

if(ua.includes("Android"))
return "Android";

if(ua.includes("iPhone"))
return "iOS";

if(ua.includes("Windows"))
return "Windows";

if(ua.includes("Mac"))
return "MacOS";

return "Unknown";

}



// Device type

function deviceType(){

if(/Mobi|Android/i.test(ua))
return "Mobile";

return "Desktop";

}


document.getElementById("deviceType").innerHTML =
deviceType();



// Device model (mostly Android)

let model="Unknown";


if(ua.includes("SM-"))
{
    let match=ua.match(/SM-[A-Z0-9]+/);
    if(match)
    model=match[0];
}


document.getElementById("deviceName").innerHTML=model;



// Screen

document.getElementById("screen").innerHTML =
screen.width+" x "+screen.height;



// CPU

document.getElementById("cpu").innerHTML =
navigator.hardwareConcurrency || "Unknown";



// RAM

document.getElementById("ram").innerHTML =
navigator.deviceMemory ?
navigator.deviceMemory+" GB":
"Unknown";



// Language

document.getElementById("lang").innerHTML =
navigator.language;



// Time zone

document.getElementById("timezone").innerHTML =
Intl.DateTimeFormat().resolvedOptions().timeZone;



// Battery

if(navigator.getBattery){

navigator.getBattery()
.then(function(b){

document.getElementById("battery").innerHTML =
Math.round(b.level*100)+" %";


});

}
else{

document.getElementById("battery").innerHTML =
"Not supported";

}



// IP Address

fetch("https://ipapi.co/json/")
.then(res=>res.json())
.then(data=>{

document.getElementById("ip").innerHTML =
data.ip;

});



</script>


</body>
</html>
