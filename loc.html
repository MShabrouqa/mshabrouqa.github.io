<!DOCTYPE html>
<html>
<head>

<title>Device Information</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
    font-family:Arial;
    background:#f2f2f2;
    padding:20px;
}

.box{

    background:white;
    padding:20px;
    border-radius:10px;
    max-width:600px;
    margin:auto;

}

p{
    border-bottom:1px solid #ddd;
    padding:5px;
}

a{
    color:blue;
}

</style>

</head>


<body>


<div class="box">


<h2>Device Information</h2>


<p>Status:
<span id="status">Loading...</span>
</p>


<p>Public IP:
<span id="ip">-</span>
</p>


<p>Country:
<span id="country">-</span>
</p>


<p>City:
<span id="city">-</span>
</p>


<p>Latitude:
<span id="lat">-</span>
</p>


<p>Longitude:
<span id="lon">-</span>
</p>


<p>
Google Map:
<a id="map" target="_blank">
-
</a>
</p>


<hr>


<h3>Device</h3>


<p>Type:
<span id="device">-</span>
</p>


<p>OS:
<span id="os">-</span>
</p>


<p>Browser:
<span id="browser">-</span>
</p>


<p>Device Model:
<span id="model">-</span>
</p>


<p>Screen:
<span id="screen">-</span>
</p>


<p>Language:
<span id="lang">-</span>
</p>


<p>CPU Cores:
<span id="cpu">-</span>
</p>


<p>RAM:
<span id="ram">-</span>
</p>


<hr>


<h3>Battery</h3>


<p>Battery:
<span id="battery">-</span>
</p>


<p>Charging:
<span id="charging">-</span>
</p>


</div>



<script>


// =======================
// Device Information
// =======================


function getDeviceInfo(){


let ua=navigator.userAgent;


// OS

let os="Unknown";


if(/Android/i.test(ua))
    os="Android";

else if(/iPhone|iPad/i.test(ua))
    os="iOS";

else if(/Windows/i.test(ua))
    os="Windows";

else if(/Mac/i.test(ua))
    os="MacOS";

else if(/Linux/i.test(ua))
    os="Linux";



document.getElementById("os").innerHTML=os;



// Device type

let type="PC";


if(/Mobile/i.test(ua))
    type="Mobile";

else if(/Tablet/i.test(ua))
    type="Tablet";


document.getElementById("device").innerHTML=type;



// Browser

let browser="Unknown";


if(ua.includes("Chrome"))
    browser="Chrome";

else if(ua.includes("Firefox"))
    browser="Firefox";

else if(ua.includes("Safari"))
    browser="Safari";

else if(ua.includes("Edge"))
    browser="Edge";


document.getElementById("browser").innerHTML=browser;



// Model estimation

let model="Unknown";


if(/iPhone/i.test(ua))
    model="iPhone";

else if(/Android/i.test(ua))
    model="Android Device";


document.getElementById("model").innerHTML=model;



// Other data


document.getElementById("screen").innerHTML =
screen.width+" x "+screen.height;


document.getElementById("lang").innerHTML =
navigator.language;


document.getElementById("cpu").innerHTML =
navigator.hardwareConcurrency || "Not available";


document.getElementById("ram").innerHTML =
(navigator.deviceMemory || "Unknown")+" GB";

}



// =======================
// Battery
// =======================


function getBattery(){


if(navigator.getBattery){


navigator.getBattery()

.then(function(b){


document.getElementById("battery").innerHTML =
Math.round(b.level*100)+" %";


document.getElementById("charging").innerHTML =
b.charging ? "Yes":"No";


});


}

else{


document.getElementById("battery").innerHTML =
"Not supported";


}

}



// =======================
// Location
// =======================


async function getLocation(){


if(navigator.permissions){


try{


let p=await navigator.permissions.query({
name:"geolocation"
});


if(p.state==="granted"){


navigator.geolocation.getCurrentPosition(
showGPS,
getIP
);


}

else{


getIP();


}


}

catch(e){

getIP();

}


}

else{

getIP();

}


}



function showGPS(pos){


displayLocation(

pos.coords.latitude,
pos.coords.longitude,
"GPS"

);


}



function getIP(){


fetch("https://ipapi.co/json/")

.then(r=>r.json())

.then(data=>{


document.getElementById("ip").innerHTML =
data.ip;


document.getElementById("country").innerHTML =
data.country_name;


document.getElementById("city").innerHTML =
data.city;


displayLocation(

data.latitude,
data.longitude,
"IP Location"

);



});


}




function displayLocation(lat,lon,type){


document.getElementById("status").innerHTML =
type;


document.getElementById("lat").innerHTML=lat;


document.getElementById("lon").innerHTML=lon;


document.getElementById("map").href =
"https://www.google.com/maps?q="+lat+","+lon;


document.getElementById("map").innerHTML =
"Open Google Maps";


}



// Start

getDeviceInfo();

getBattery();

getLocation();


</script>


</body>
</html>
