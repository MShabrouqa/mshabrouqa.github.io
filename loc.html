<!DOCTYPE html>
<html>
<head>

<title>Device Information</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
    font-family:Arial;
    text-align:center;
    margin:30px;
}

.box{
    background:#eee;
    padding:20px;
    border-radius:10px;
    text-align:left;
    max-width:500px;
    margin:auto;
}

p{
    font-size:16px;
}

</style>

</head>


<body>


<div class="box">

<h2>Device Information</h2>


<p>Status:
<span id="status">Loading...</span>
</p>


<p>IP Address:
<span id="ip">-</span>
</p>


<p>Country:
<span id="country">-</span>
</p>


<p>City:
<span id="city">-</span>
</p>


<p>Operating System:
<span id="os">-</span>
</p>


<p>Device Type:
<span id="device">-</span>
</p>


<p>Browser:
<span id="browser">-</span>
</p>


<p>Screen:
<span id="screen">-</span>
</p>


<p>CPU Cores:
<span id="cpu">-</span>
</p>


<p>RAM:
<span id="ram">-</span>
</p>


<p>Language:
<span id="lang">-</span>
</p>


<p>Time Zone:
<span id="timezone">-</span>
</p>


<p>Battery:
<span id="battery">-</span>
</p>


</div>



<script>


// Get IP information

fetch("https://ipapi.co/json/")

.then(response=>response.json())

.then(data=>{


document.getElementById("ip").innerHTML=data.ip;

document.getElementById("country").innerHTML=data.country_name;

document.getElementById("city").innerHTML=data.city;


})

.catch(()=>{

document.getElementById("ip").innerHTML="Unavailable";

});




// Operating System

function getOS(){

let ua=navigator.userAgent;


if(ua.includes("Windows"))
return "Windows";


if(ua.includes("Android"))
return "Android";


if(ua.includes("iPhone"))
return "iOS";


if(ua.includes("Mac"))
return "MacOS";


if(ua.includes("Linux"))
return "Linux";


return "Unknown";

}


document.getElementById("os").innerHTML=getOS();




// Device type

function getDevice(){

let ua=navigator.userAgent;


if(/Mobi|Android/i.test(ua))
return "Mobile";


if(/Tablet/i.test(ua))
return "Tablet";


return "PC";

}


document.getElementById("device").innerHTML=getDevice();




// Browser

document.getElementById("browser").innerHTML =
navigator.userAgent;




// Screen

document.getElementById("screen").innerHTML =
screen.width+" x "+screen.height;




// CPU

document.getElementById("cpu").innerHTML =
navigator.hardwareConcurrency || "Not available";




// RAM

document.getElementById("ram").innerHTML =
navigator.deviceMemory ?
navigator.deviceMemory+" GB":
"Not available";




// Language

document.getElementById("lang").innerHTML =
navigator.language;




// Timezone

document.getElementById("timezone").innerHTML =
Intl.DateTimeFormat().resolvedOptions().timeZone;




// Battery

if(navigator.getBattery){


navigator.getBattery()

.then(function(battery){


function updateBattery(){


document.getElementById("battery").innerHTML =
Math.round(battery.level*100)+"%";


}


updateBattery();


battery.addEventListener(
"levelchange",
updateBattery
);


});


}
else{


document.getElementById("battery").innerHTML =
"Not supported";


}



document.getElementById("status").innerHTML="Ready";


</script>


</body>
</html>
