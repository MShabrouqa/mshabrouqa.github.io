<!DOCTYPE html>
<html>

<head>

<title>Complete Device Information</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
font-family:Arial;
margin:20px;
background:#eee;
}

.box{
background:white;
padding:20px;
border-radius:10px;
max-width:800px;
margin:auto;
}

table{
width:100%;
border-collapse:collapse;
}

td{
border-bottom:1px solid #ddd;
padding:8px;
word-break:break-all;
}

h2{
text-align:center;
}

</style>

</head>


<body>


<div class="box">

<h2>Device Information</h2>


<table id="info">

</table>


<br>

<a id="map" target="_blank">
Google Maps Location
</a>


</div>



<script>


let data={};


// Add item to table

function add(name,value){

data[name]=value;

let row=
`
<tr>
<td><b>${name}</b></td>
<td>${value}</td>
</tr>
`;

document
.getElementById("info")
.innerHTML+=row;

}




// Browser data

add(
"User Agent",
navigator.userAgent
);


add(
"Platform",
navigator.platform
);


add(
"Language",
navigator.language
);


add(
"Languages",
navigator.languages
);


add(
"Cookies Enabled",
navigator.cookieEnabled
);


add(
"Do Not Track",
navigator.doNotTrack
);


add(
"Online Status",
navigator.onLine
);



// Screen

add(
"Screen Resolution",
screen.width+" x "+screen.height
);


add(
"Available Screen",
screen.availWidth+" x "+screen.availHeight
);


add(
"Color Depth",
screen.colorDepth
);


add(
"Pixel Depth",
screen.pixelDepth
);



// Hardware


add(
"CPU Cores",
navigator.hardwareConcurrency || "Unknown"
);


add(
"RAM",
(navigator.deviceMemory || "Unknown")+" GB"
);


add(
"Touch Points",
navigator.maxTouchPoints
);



// Time


add(
"Time Zone",
Intl.DateTimeFormat()
.resolvedOptions()
.timeZone
);


add(
"Local Time",
new Date()
);



// Connection

if(navigator.connection){

add(
"Network Type",
navigator.connection.effectiveType
);


add(
"Downlink",
navigator.connection.downlink+" Mbps"
);


add(
"RTT",
navigator.connection.rtt+" ms"
);

}


// Battery


if(navigator.getBattery){


navigator.getBattery()

.then(function(b){


add(
"Battery Level",
Math.round(b.level*100)+"%"
);


add(
"Charging",
b.charging
);


});


}



// Location


async function locationCheck(){


if(navigator.permissions){


try{


let p=
await navigator.permissions.query(
{name:"geolocation"}
);



if(p.state==="granted"){


navigator.geolocation.getCurrentPosition(

function(pos){


showLocation(

pos.coords.latitude,
pos.coords.longitude,
"GPS"

);


}

);


}

else{


ipLocation();


}


}

catch{

ipLocation();

}


}

else{

ipLocation();

}


}




// IP location


function ipLocation(){


fetch(
"https://ipapi.co/json/"
)

.then(r=>r.json())

.then(d=>{


add(
"Public IP",
d.ip
);


add(
"ISP",
d.org
);


add(
"Country",
d.country_name
);


add(
"City",
d.city
);



showLocation(

d.latitude,
d.longitude,
"IP"

);


});


}





function showLocation(lat,lon,type){


add(
"Location Source",
type
);


add(
"Latitude",
lat
);


add(
"Longitude",
lon
);


document
.getElementById("map")
.href=
"https://www.google.com/maps?q="
+lat+","+lon;


}



// Start

locationCheck();


// Plugins

let plugins=[];

for(let i=0;i<navigator.plugins.length;i++){

plugins.push(
navigator.plugins[i].name
);

}

add(
"Plugins",
plugins.join(", ")
);



</script>


</body>

</html>
